# wingman_yolo 配置文件
# 运行时点击 "重载配置" 按钮即可生效,无需重启程序

# ── 屏幕捕获（仅 IDLE 状态生效） ──
capture_size: 640       # 截屏区域边长: 480 / 540 / 640 / 720 / 800 / 960 / 1280

# ── 检测后处理 ──
conf_thres: 0.30       # 置信度阈值 (低→多框多误报, 高→少框可能漏检)
iou_thres: 0.45        # NMS IoU 阈值 (低→框删得狠, 高→允许重叠)
max_det: 300           # NMS 后最大保留框数
agnostic_nms: false    # 跨类别 NMS (一般不开)

# ── 目标识别 ──
enemy_label: 0         # 敌人标签 ID (0=person, 1=else)
target_strategy: nearest  # 目标策略: nearest(最近中心) / largest(最大威胁) / crosshair(光标附近)

# ── 鼠标控制 ──
pid_kp: 0.15           # PID 比例增益 (响应速度)
pid_ki: 0.005          # PID 积分增益 (稳态微调, 太大易过冲)
pid_kd: 0.02           # PID 微分增益 (抖动抑制, 太大手感变"肉")
pid_max_integral: 10.0 # PID 积分限幅 (防 windup)
pid_deadband: 6.0      # PID 死区像素 (误差<此值停止移动)
pid_kff: 0.0            # 速度前馈增益 (0=关闭, >0 利用目标速度补偿积分滞后)
noise_amplitude: 0.0    # 人类化噪声注入幅度 (0=关闭, 先排查根因)

# ── 吸附辅助 ──
aim_magnet_strength: 0.4   # 吸附力度 (0=关闭, 0.1-0.8 推荐)
aim_engage_range: 60       # 吸附触发距离 (px, 准星进入此范围自动吸附)
aim_override_threshold: 25 # 手动接管阈值 (px/帧, 人手移动超过此值则接管)
aim_base_speed: 4.0        # 吸附基础速度 (px/帧)
mouse_sensitivity: 1.0  # 鼠标灵敏度倍率 (越大自瞄越强, 建议 0.5~2.0)

# ── 推理引擎 ──
use_tensorrt: false    # TensorRT 推理 (需导出 .engine, 依赖 onnx/onnxruntime-gpu)

# ── 显示 ──
view_img: true         # 显示检测预览窗口
show_fps: false        # 预览窗口显示帧率
